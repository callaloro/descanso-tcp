<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Descanso mínimo obligatorio en vuelo TCP</title>

<meta name="theme-color" content="#f7f7f5" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Descanso TCP" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/icon-192.png" sizes="192x192" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<style>
:root{
  --bg:#f7f7f5; --card:#ffffff; --text:#171717; --muted:#6f6f6f; --line:#e7e2dc;
  --accent:#b00020; --accent2:#f6eef0; --ok:#107c41; --warn:#a15c00;
  --shadow: 0 18px 55px rgba(0,0,0,.10);
}
*{box-sizing:border-box} body{margin:0;font-family:Inter,Roboto,system-ui,-apple-system,Segoe UI,sans-serif;background:linear-gradient(180deg,#fafaf8,#f0efec);color:var(--text);}
.wrap{max-width:520px;margin:0 auto;padding:24px 18px 42px;}
.card{background:var(--card);border-radius:28px;padding:28px 24px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04)}
h1{font-size:28px;line-height:1.05;margin:0 0 8px;font-weight:850;letter-spacing:-.03em}.sub{font-size:14px;color:var(--muted);margin:0 0 26px}
.field{margin:22px 0}.label{font-size:15px;font-weight:750;margin:0 0 10px}.wheel{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center}.colon{font-size:28px;color:#777;margin-top:26px}.selectbox{display:flex;flex-direction:column;gap:6px}.selectbox span{font-size:12px;color:var(--muted);padding-left:5px}
select{width:100%;font-size:25px;font-weight:650;padding:15px 14px;border-radius:18px;border:1px solid #d8d5d1;background:#f6f5f3;color:#111;appearance:auto;text-align:center;min-height:62px}
.segmented{display:grid;grid-template-columns:1fr 1fr;gap:12px}.seg{border:1px solid #ddd8d2;background:#f6f5f3;border-radius:18px;min-height:62px;font-size:24px;font-weight:800;color:#222}.seg.active{background:#111;color:#fff;border-color:#111}
.actions{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin-top:24px}.btn{border:none;border-radius:20px;min-height:62px;padding:0 18px;font-size:17px;font-weight:850;background:#111;color:white;box-shadow:0 10px 20px rgba(0,0,0,.12)}.clear{background:#f1efec;color:#555;box-shadow:none;min-width:70px}.btn:active,.seg:active{transform:scale(.985)}
.result{margin-top:24px;border-radius:24px;padding:22px;background:#f7f5f3;border:1px solid var(--line);display:none;opacity:0;transform:translateY(10px);transition:.28s ease}.result.show{display:block;opacity:1;transform:translateY(0)}.status{font-size:13px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;color:var(--muted);margin-bottom:8px}.rest{font-size:42px;font-weight:900;letter-spacing:-.04em}.rest.warn{color:var(--accent)}.mini{margin-top:12px;color:var(--muted);font-size:14px;line-height:1.4}.detailsBtn{margin-top:16px;border:none;background:transparent;color:#111;font-weight:800;font-size:15px;padding:8px 0}.details{display:none;border-top:1px solid var(--line);margin-top:12px;padding-top:16px}.details.open{display:block}.row{display:flex;justify-content:space-between;gap:16px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:14px}.row b{font-weight:800}.note{margin-top:14px;font-size:12px;color:var(--muted);line-height:1.35}.error{background:#fff0f2;border-left:6px solid var(--accent);padding:16px;border-radius:18px;font-weight:750;line-height:1.3}.footer{font-size:12px;color:#858585;text-align:center;margin:18px 0 0;line-height:1.5}.tests{display:none;margin-top:18px;background:#fbfbfa;border:1px solid var(--line);border-radius:18px;padding:14px}.testok{color:var(--ok)}.testbad{color:var(--accent)}
@media (prefers-color-scheme: dark){:root{--bg:#111;--card:#1b1b1b;--text:#f5f5f5;--muted:#aaa;--line:#333}.card{background:#1b1b1b}body{background:#111}select,.seg{background:#262626;color:#fff;border-color:#333}.result{background:#222}.clear{background:#2a2a2a;color:#ddd}.btn{background:#fff;color:#111}.seg.active{background:#fff;color:#111;border-color:#fff}.detailsBtn{color:#fff}.error{background:#31151b}.footer{color:#999}}
</style>
</head>
<body>
<div class="wrap"><div class="card">
  <h1>Descanso mínimo obligatorio en vuelo TCP</h1>
  <p class="sub">Convenio XIII · Art. 79 · Anexo 10A · Anexo 10B</p>

  <div class="field"><p class="label">Hora local de despegue programado</p><div class="wheel">
    <div class="selectbox"><span>Hora</span><select id="depH"></select></div><div class="colon">:</div><div class="selectbox"><span>Min</span><select id="depM"></select></div>
  </div></div>

  <div class="field"><p class="label">Tiempo de vuelo baremo</p><div class="wheel">
    <div class="selectbox"><span>Horas</span><select id="fltH"></select></div><div class="colon">:</div><div class="selectbox"><span>Min</span><select id="fltM"></select></div>
  </div></div>

  <div class="field"><p class="label">Número de aterrizajes</p><div class="segmented">
    <button class="seg active" id="seg1" type="button">1</button><button class="seg" id="seg2" type="button">2</button>
  </div></div>

  <div class="actions"><button class="btn" id="calc" type="button">Calcular descanso</button><button class="btn clear" id="clear" type="button">Limpiar</button></div>

  <div id="result" class="result"></div>
  <div id="tests" class="tests"></div>
  <p class="footer">Versión 1.0.0 · XIII Convenio Colectivo TCP<br>Prototipo validable: revisar antes de uso operativo.</p>
</div></div>
<script>
const $=id=>document.getElementById(id);
const pad=n=>String(n).padStart(2,'0');
const fmt=m=>`${Math.floor(m/60)} h ${pad(m%60)} min`;
const fmtShort=m=>`${Math.floor(m/60)}:${pad(m%60)}`;
const toMin=s=>{let [h,m]=s.split(':').map(Number);return h*60+m};
const inRange=(x,start,end)=> start<=end ? x>=start&&x<=end : x>=start||x<=end;
function addOpts(sel,from,to,step=1){for(let i=from;i<=to;i+=step){const o=document.createElement('option');o.value=i;o.textContent=pad(i);sel.appendChild(o)}}
addOpts($('depH'),0,23); addOpts($('depM'),0,59); addOpts($('fltH'),8,16); addOpts($('fltM'),0,59);
let landings=1;
$('seg1').onclick=()=>{landings=1;$('seg1').classList.add('active');$('seg2').classList.remove('active');save()}
$('seg2').onclick=()=>{landings=2;$('seg2').classList.add('active');$('seg1').classList.remove('active');save()}

// Artículo 79 – Límites de actividad aérea. Solo 1 y 2 aterrizajes.
const art79=[
 {start:'07:01',end:'15:00',limits:{1:'14:00',2:'14:00'},label:'07:01–15:00'},
 {start:'15:01',end:'18:00',limits:{1:'13:30',2:'13:00'},label:'15:01–18:00'},
 {start:'18:01',end:'23:00',limits:{1:'12:30',2:'12:00'},label:'18:01–23:00'},
 {start:'23:01',end:'06:00',limits:{1:'11:30',2:'11:00'},label:'23:01–06:00'},
 {start:'06:01',end:'07:00',limits:{1:'13:30',2:'13:00'},label:'06:01–07:00'},
];
const anexo10A=[
 {from:'08:01',to:'09:00',rest:'01:00',label:'08:01–09:00'},
 {from:'09:01',to:'10:00',rest:'01:15',label:'09:01–10:00'},
 {from:'10:01',to:'11:00',rest:'01:30',label:'10:01–11:00'},
 {from:'11:01',to:'12:00',rest:'02:00',label:'11:01–12:00'},
 {from:'12:01',to:'12:30',rest:'02:50',label:'12:01–12:30'},
];
// Anexo 10B leído de la tabla enviada. Se usa por tiempo de vuelo y por actividad; se toma el descanso más favorable.
const anexo10B=[
 {flightFrom:'10:01',flightTo:'11:00',actFrom:'11:46',actTo:'12:45',rules:[{min:1,max:30,rest:'01:45',label:'01–30 min'},{min:31,max:60,rest:'02:00',label:'31–60 min'}],label:'10:01–11:00 / 11:46–12:45'},
 {flightFrom:'11:01',flightTo:'12:00',actFrom:'12:46',actTo:'13:45',rules:[{min:1,max:30,rest:'02:15',label:'01–30 min'},{min:31,max:60,rest:'02:30',label:'31–60 min'},{min:61,max:999,rest:'02:45',label:'Más de 60 min'}],label:'11:01–12:00 / 12:46–13:45'},
 {flightFrom:'12:01',flightTo:'12:30',actFrom:'13:46',actTo:'14:15',rules:[{min:1,max:999,rest:'02:55',label:'Desde 01 min'}],label:'12:01–12:30 / 13:46–14:15'},
 {flightFrom:'12:31',flightTo:'13:30',actFrom:'14:16',actTo:'15:15',rules:[{min:1,max:30,rest:'02:55',label:'01–30 min'},{min:31,max:60,rest:'03:10',label:'31–60 min'},{min:61,max:999,rest:'03:25',label:'Más de 60 min'}],label:'12:31–13:30 / 14:16–15:15'},
 {flightFrom:'13:31',flightTo:'14:30',actFrom:'15:16',actTo:'16:15',rules:[{min:61,max:150,rest:'03:25',label:'61–150 min'},{min:151,max:270,rest:'03:40',label:'151–270 min'}],label:'13:31–14:30 / 15:16–16:15'},
];
function artLimit(dep,lands){const row=art79.find(r=>inRange(dep,toMin(r.start),toMin(r.end))); if(!row) return null; return {row,limit:toMin(row.limits[lands])};}
function lookupA(flt){const r=anexo10A.find(x=>flt>=toMin(x.from)&&flt<=toMin(x.to)); return r?{row:r,rest:toMin(r.rest)}:null;}
function lookupBBy(kind,val,excess){let out=[]; for(const r of anexo10B){const from=toMin(kind==='flight'?r.flightFrom:r.actFrom), to=toMin(kind==='flight'?r.flightTo:r.actTo); if(val>=from&&val<=to){const rule=r.rules.find(q=>excess>=q.min&&excess<=q.max); if(rule) out.push({kind,row:r,rule,rest:toMin(rule.rest)});}}
return out[0]||null;}
function calculate(dep,flt,lands){const activity=flt+105; const lim=artLimit(dep,lands); if(!lim) throw new Error('La hora de despegue no encaja en el Artículo 79.'); const excess=activity-lim.limit;
 if(excess<=0){const a=lookupA(flt); if(!a) throw new Error('Actividad dentro de límites, pero el tiempo de vuelo no encaja en el Anexo 10A cargado. Falta completar esa franja.'); return {ok:true,type:'10A',rest:a.rest,activity,limit:lim.limit,artRow:lim.row,excess,detailA:a};}
 const byFlight=lookupBBy('flight',flt,excess); const byAct=lookupBBy('activity',activity,excess); const candidates=[byFlight,byAct].filter(Boolean); if(!candidates.length) throw new Error('Actividad excedida, pero el caso no encaja en el Anexo 10B cargado. Falta completar/verificar esa franja.'); const best=candidates.reduce((a,b)=>a.rest>=b.rest?a:b); return {ok:true,type:'10B',rest:best.rest,activity,limit:lim.limit,artRow:lim.row,excess,byFlight,byAct,best};}
function render(res,inp){let html='';
 if(res.error){html=`<div class="error">${res.error}</div>`} else {
 const warn=res.type==='10B';
 html=`<div class="status">${warn?'Supera límite · Anexo 10B':'Dentro de límite · Anexo 10A'}</div><div class="rest ${warn?'warn':''}">${fmt(res.rest)}</div><div class="mini">Actividad ${fmtShort(res.activity)} · Límite ${fmtShort(res.limit)} · ${res.excess>0?'Exceso '+res.excess+' min':'sin exceso'}</div><button class="detailsBtn" onclick="document.getElementById('details').classList.toggle('open')">Ver cálculo</button><div class="details" id="details">
 <div class="row"><b>Hora despegue</b><span>${pad(Math.floor(inp.dep/60))}:${pad(inp.dep%60)}</span></div>
 <div class="row"><b>Tiempo de vuelo baremo</b><span>${fmtShort(inp.flt)}</span></div>
 <div class="row"><b>Actividad</b><span>${fmtShort(res.activity)} = vuelo + 1:45</span></div>
 <div class="row"><b>Artículo 79</b><span>${res.artRow.label} · ${inp.lands} aterrizaje${inp.lands>1?'s':''}</span></div>
 <div class="row"><b>Límite actividad aérea</b><span>${fmtShort(res.limit)}</span></div>
 <div class="row"><b>Exceso</b><span>${res.excess>0?res.excess+' min':'No supera'}</span></div>`;
 if(res.type==='10A') html+=`<div class="row"><b>Anexo 10A</b><span>${res.detailA.row.label}</span></div><div class="row"><b>Descanso</b><span>${fmt(res.rest)}</span></div>`;
 else {html+=`<div class="row"><b>Anexo 10B por vuelo</b><span>${res.byFlight?res.byFlight.row.flightFrom+'–'+res.byFlight.row.flightTo+' · '+res.byFlight.rule.label+' → '+fmt(res.byFlight.rest):'No aplica / no cargado'}</span></div><div class="row"><b>Anexo 10B por actividad</b><span>${res.byAct?res.byAct.row.actFrom+'–'+res.byAct.row.actTo+' · '+res.byAct.rule.label+' → '+fmt(res.byAct.rest):'No aplica / no cargado'}</span></div><div class="row"><b>Criterio aplicado</b><span>Mayor descanso favorable: ${fmt(res.rest)}</span></div>`;}
 html+=`</div><div class="note">Este prototipo usa las tablas transcritas en la conversación. Validar contra convenio antes de uso operativo.</div>`;
 }
 const el=$('result'); el.innerHTML=html; el.style.display='block'; requestAnimationFrame(()=>el.classList.add('show'));
}
function current(){return {dep:Number($('depH').value)*60+Number($('depM').value), flt:Number($('fltH').value)*60+Number($('fltM').value), lands:landings}}
function save(){localStorage.setItem('tcpRestV1',JSON.stringify({depH:$('depH').value,depM:$('depM').value,fltH:$('fltH').value,fltM:$('fltM').value,landings}))}
function load(){const s=localStorage.getItem('tcpRestV1'); if(s){try{const v=JSON.parse(s); $('depH').value=v.depH||'16';$('depM').value=v.depM||'25';$('fltH').value=v.fltH||'12';$('fltM').value=v.fltM||'40';landings=v.landings||1;}catch(e){}} else {$('depH').value='16';$('depM').value='25';$('fltH').value='12';$('fltM').value='40';landings=1} $('seg1').classList.toggle('active',landings===1);$('seg2').classList.toggle('active',landings===2)}
['depH','depM','fltH','fltM'].forEach(id=>$(id).addEventListener('change',save));
$('calc').onclick=()=>{save(); if(navigator.vibrate) navigator.vibrate(15); const inp=current(); try{render(calculate(inp.dep,inp.flt,inp.lands),inp)}catch(e){render({error:e.message},inp)}};
$('clear').onclick=()=>{localStorage.removeItem('tcpRestV1');$('depH').value='16';$('depM').value='25';$('fltH').value='12';$('fltM').value='40';landings=1;$('seg1').classList.add('active');$('seg2').classList.remove('active');$('result').classList.remove('show');$('result').style.display='none'};
load();
</script>
<script>
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {});
  });
}
</script>
</body></html>
